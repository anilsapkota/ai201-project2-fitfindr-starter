<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FitFindr Agent Architecture</title>
<style>
  body { margin: 0; padding: 24px; background: #fff; font-family: sans-serif; }
  svg { width: 100%; max-width: 780px; display: block; margin: 0 auto; }
</style>
</head>
<body>
<svg viewBox="0 0 780 920" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>FitFindr Agent Architecture Diagram</title>
  <desc>Flowchart showing how the FitFindr agent processes a user query through search_listings, suggest_outfit, and create_fit_card tools with error handling paths.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- User Query -->
  <rect x="240" y="20" width="300" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="390" y="44" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">User query</text>
  <text x="390" y="62" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">description, size, max_price, wardrobe</text>

  <!-- Arrow down -->
  <line x1="390" y1="76" x2="390" y2="110" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- run_agent Planning Loop -->
  <rect x="190" y="110" width="400" height="66" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="390" y="134" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">run_agent() — Planning Loop</text>
  <text x="390" y="154" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">session = { query, selected_item: None,</text>
  <text x="390" y="168" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">outfit_suggestion: None, fit_card: None, error: None }</text>

  <!-- Arrow down -->
  <line x1="390" y1="178" x2="390" y2="212" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- search_listings box -->
  <rect x="215" y="212" width="350" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="390" y="236" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">search_listings</text>
  <text x="390" y="254" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">description, size, max_price</text>

  <!-- Arrow to diamond -->
  <line x1="390" y1="268" x2="390" y2="300" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Diamond: no results? -->
  <polygon points="390,300 460,330 390,360 320,330" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="390" y="326" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#2C2C2A">No results?</text>
  <text x="390" y="342" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#5F5E5A">results == []</text>

  <!-- Yes branch → error -->
  <line x1="460" y1="330" x2="590" y2="330" stroke="#E24B4A" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="520" y="322" text-anchor="middle" font-size="11" fill="#A32D2D">Yes</text>
  <rect x="590" y="300" width="160" height="60" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="670" y="324" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#791F1F">session error set</text>
  <text x="670" y="342" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#A32D2D">return session</text>

  <!-- No branch → session update -->
  <line x1="390" y1="360" x2="390" y2="394" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="402" y="380" font-size="11" fill="#3B6D11">No</text>

  <!-- session selected_item -->
  <rect x="215" y="394" width="350" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="390" y="412" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#27500A">session["selected_item"] = results[0]</text>
  <text x="390" y="430" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3B6D11">top match stored in session</text>

  <!-- Arrow down -->
  <line x1="390" y1="438" x2="390" y2="472" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- suggest_outfit -->
  <rect x="215" y="472" width="350" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="390" y="496" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">suggest_outfit</text>
  <text x="390" y="514" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">selected_item, wardrobe</text>

  <!-- Arrow to diamond -->
  <line x1="390" y1="528" x2="390" y2="562" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Diamond: wardrobe empty? -->
  <polygon points="390,562 460,592 390,622 320,592" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="390" y="588" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#2C2C2A">Wardrobe</text>
  <text x="390" y="604" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#2C2C2A">empty?</text>

  <!-- Yes → general styling prompt -->
  <line x1="460" y1="592" x2="590" y2="592" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="520" y="584" text-anchor="middle" font-size="11" fill="#854F0B">Yes</text>
  <rect x="590" y="562" width="160" height="60" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="670" y="585" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#633806">General styling</text>
  <text x="670" y="603" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#854F0B">prompt (no crash)</text>

  <!-- Both paths merge down -->
  <line x1="670" y1="622" x2="670" y2="652" stroke="#888780" stroke-width="1"/>
  <line x1="670" y1="652" x2="530" y2="652" stroke="#888780" stroke-width="1"/>
  <line x1="390" y1="622" x2="390" y2="652" stroke="#888780" stroke-width="1"/>
  <line x1="390" y1="652" x2="530" y2="652" stroke="#888780" stroke-width="1"/>
  <line x1="530" y1="652" x2="530" y2="668" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="402" y="640" font-size="11" fill="#3B6D11">No</text>

  <!-- Returns empty string? diamond -->
  <polygon points="530,668 610,698 530,728 450,698" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="530" y="694" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#2C2C2A">Returns</text>
  <text x="530" y="710" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#2C2C2A">empty string?</text>

  <!-- Yes → error -->
  <line x1="610" y1="698" x2="680" y2="698" stroke="#E24B4A" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="645" y="690" text-anchor="middle" font-size="11" fill="#A32D2D">Yes</text>
  <rect x="682" y="668" width="80" height="60" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="722" y="692" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#791F1F">session</text>
  <text x="722" y="708" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#A32D2D">error + return</text>

  <!-- No → session outfit_suggestion -->
  <line x1="530" y1="728" x2="530" y2="762" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="542" y="748" font-size="11" fill="#3B6D11">No</text>

  <rect x="355" y="762" width="350" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="530" y="780" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#27500A">session["outfit_suggestion"] = result</text>
  <text x="530" y="798" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3B6D11">outfit string stored in session</text>

  <!-- Arrow down -->
  <line x1="530" y1="806" x2="530" y2="840" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- create_fit_card -->
  <rect x="355" y="840" width="350" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="530" y="864" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">create_fit_card</text>
  <text x="530" y="882" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">outfit_suggestion, selected_item</text>

  <!-- Final label -->
  <text x="530" y="916" text-anchor="middle" font-size="11" fill="#5F5E5A">→ session["fit_card"] = result → return session → Gradio UI</text>
</svg>
</body>
</html>
